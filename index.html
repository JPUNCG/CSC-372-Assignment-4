<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <header>
        <h1>Rock, Paper, Scissors</h1>
    </header>

    <section id="player-section">
        <h2>Your Throw</h2>
        <div class="choices">
            <img src="images/rock.png" alt="Rock" id="rock" class="choice-img">
            <img src="images/paper.png" alt="Paper" id="paper" class="choice-img">
            <img src="images/scissors.png" alt="Scissors" id="scissors" class="choice-img">
        </div>
    </section>

    <section id="computer-section">
        <h2>Computer's Throw</h2>
        <img src="images/question-mark.png" alt="Computer Choice" id="computer-img">
    </section>

    <section id="outcome-section">
        <h2 id="result-text">Choose your move to start!</h2>
    </section>

    <section id="score-section">
        <p>Wins: <span id="wins">0</span> | Losses: <span id="losses">0</span> | Ties: <span id="ties">0</span></p>
        <button id="reset-btn">Reset Game</button>
    </section>

</body>
</html>
